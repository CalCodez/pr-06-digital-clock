<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link href="https://fonts.cdnfonts.com/css/kl1monocase" rel="stylesheet" />
		<link href="https://fonts.cdnfonts.com/css/dynapuff" rel="stylesheet" />

		<link rel="stylesheet" href="./css/defaults.css" />
		<link rel="stylesheet" href="./css/styles.css" />
		<link rel="stylesheet" href="./css/responsive.css" />
		<title>Digital Clock</title>
		<script src="./js.js" defer></script>
	</head>
	<body>
		<header>
			<span class="logo-span">C</span>
			<nav class="main-nav">
				<a href="#">Stories</a>
				<a href="#">Videos</a>
				<a href="#">Notes</a>
			</nav>
		</header>

		<section class="hero-section container">
			<img src="./assets/images/background/moon_phases.jpg" alt="rainy day" />
			<div class="container hero-header-container">
				<h1>When Depression Doesn't Stop At Mental Health</h1>
				<h2>I AM Not Ok</h2>
			</div>
			<div class="get-help-container container">
				<p>Do you or someone you know suffer from Depression?</p>
				<a class="cta-btn" href="https://www.nami.org/" target="_blank">Get Help</a>

				<h1 class="login-header">How You Get Here?</h1>
				<input action="login()" id="password-input" type="password" name="login-password" />
				<label id="password-label" for="login-password">Enter The Damn Code</label>
				<div class="login-form-button-container">
					<a id="login-btn" class="login-btn cta-btn">LOGIN</a>
					<a class="login-btn cta-btn" id="exit-btn">EXIT</a>
				</div>
			</form>
		</div>
